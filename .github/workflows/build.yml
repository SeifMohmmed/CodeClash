name: Build
on:
  workflow_dispatch:
  push:
    branches:
      - master
env:
  DOTNET_VERSION: "9.x"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        env:
          DOTNET_NOLOGO: true
        run: |
          dotnet restore src/CodeClash.Domain/CodeClash.Domain.csproj
          dotnet restore src/CodeClash.Application/CodeClash.Application.csproj
          dotnet restore src/CodeClash.Infrastructure/CodeClash.Infrastructure.csproj
          dotnet restore src/CodeClash.API/CodeClash.API.csproj

      - name: Build
        env:
          DOTNET_NOLOGO: true
        run: dotnet build src/CodeClash.API/CodeClash.API.csproj --configuration Release --no-restore -p:TreatWarningsAsErrors=true -p:EnforceCodeStyleInBuild=true

      - name: Publish
        env:
          DOTNET_NOLOGO: true
        run: dotnet publish src/CodeClash.API/CodeClash.API.csproj --configuration Release --no-restore --no-build --output ./publish
