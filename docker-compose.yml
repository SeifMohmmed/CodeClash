services:
  codeclash.api:
    image: ${DOCKER_REGISTRY-}codeclashapi
    build:
      context: .
      dockerfile: src/CodeClash.API/Dockerfile
    ports:
    - 5000:8080
    - 5001:8081

  codeclash-seq:
    image: datalust/seq:latest
    container_name: CodeClash.Seq
    environment:
     - ACCEPT_EULA=Y
     - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
     - 5341:80

  codeclash-db:
    image: postgres:17
    container_name: CodeClash.Db
    environment:
      POSTGRES_DB: codeclash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./.containers/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"