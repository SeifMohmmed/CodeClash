services:
  codeclash.api:
    image: ${DOCKER_REGISTRY-}codeclashapi
    build:
      context: .
      dockerfile: src/CodeClash.API/Dockerfile
    ports:
    - 5000:8080
    - 5001:8081
    environment:
      # Aspire Dashboard
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://codeclash.aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc

  devhabit.aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: true
    ports:
      - 18888:18888