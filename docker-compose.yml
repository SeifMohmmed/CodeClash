services:
  codeclash.api:
    image: ${DOCKER_REGISTRY-}codeclashapi
    build:
      context: .
      dockerfile: src/CodeClash.API/Dockerfile
    environment:
    - ASPNETCORE_ENVIRONMENT=Development  
    ports:
    - 5000:8080
    - 5001:8081

    depends_on:
      codeclash-db:
        condition: service_healthy
      codeclash-cache:
        condition: service_healthy
      codeclash-seq:
        condition: service_started
      elasticsearch:
        condition: service_healthy  # Wait until ES is actually ready

  codeclash-seq:
    image: datalust/seq:latest
    container_name: CodeClash.Seq
    environment:
     - ACCEPT_EULA=Y
     - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
     - 5341:80

  codeclash-db:
    image: postgres:17
    container_name: CodeClash.Db
    environment:
      POSTGRES_DB: codeclash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./.containers/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  codeclash-cache:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

      
  elasticsearch:
    container_name: elasticSearch
    image: elasticsearch:8.15.0
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s  # Give ES time to JVM boot before checking

  kibana:
    container_name: kibana
    image: kibana:8.15.0
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200

volumes:
  elasticsearch-data:       